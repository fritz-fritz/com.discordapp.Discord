        dest-filename: discord.tar.gz
        strip-components: 0
        url: https://dl.discordapp.net/apps/linux/1.0.146/discord-1.0.146.tar.gz
        sha256: d96d0658ffd3aa62ddf704035fb0ace0d6f22739c5b5c7e5eb26720211cfe710
